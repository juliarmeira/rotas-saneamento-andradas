<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotas de Inspeção - SES Andradas</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="app-header">
        <div class="title-container">
            <h1>Sistema Operacional de Saneamento</h1>
            <p>Roteamento Técnico e Diagnóstico de ETEs • Andradas/MG</p>
        </div>
        
        <div class="route-controls">
            <button class="route-btn active" onclick="setRouteFilter('all')" id="btn-route-all">
                <span class="btn-icon">🗺️</span> <span class="btn-text">Todos os Pontos</span>
            </button>
            <button class="route-btn" onclick="setRouteFilter('etes')" id="btn-route-etes">
                <span class="btn-icon">📍</span> <span class="btn-text">Rota ETEs</span>
            </button>
            <button class="route-btn" onclick="setRouteFilter('rural')" id="btn-route-rural">
                <span class="btn-icon">🏘️</span> <span class="btn-text">Rota Rural</span>
            </button>
        </div>
    </header>

    <main id="main-content">
        <div id="map"></div>
    </main>

    <!-- Dashboard de Rota -->
    <div id="route-dashboard" class="route-dashboard hidden">
        <div class="dashboard-handle" id="dashboard-toggle"></div>
        <h4 class="dashboard-title">Estimativa de Deslocamento</h4>
        <div class="dashboard-stats">
            <div class="stat-item">
                <span class="stat-label">Distância Total</span>
                <span id="route-distance" class="stat-value">-- km</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Tempo Previsto (~40km/h)</span>
                <span id="route-time" class="stat-value">-- min</span>
            </div>
        </div>
        <div id="route-segments" class="route-segments"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Dados de Rotas (Google Earth KML) -->
    <script src="routes_data.js"></script>
    
    <!-- Dados de Pontos e Centros (ETEs) -->
    <script src="points_data.js"></script>
    
    <!-- Lógica Principal -->
    <script src="script.js"></script>
</body>
</html>
